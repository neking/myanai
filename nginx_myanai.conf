# MyanAi Platform — Nginx Configuration
# Replace: yourdomain.com → your actual domain
# PHP version: adjust php8.X-fpm.sock as needed

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com;

    root  /var/www/myanai;
    index landing-page.html index.php index.html;

    # SSL (update after certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Landing page root
    location = / {
        try_files /landing-page.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;  # adjust version
        fastcgi_read_timeout 120;
    }

    # Security
    add_header X-Frame-Options    "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"  always;
    add_header Referrer-Policy    "strict-origin" always;

    location ~ /\.git  { deny all; return 404; }
    location ~ /\.ht   { deny all; return 404; }
    location ~ /\.env  { deny all; return 404; }

    # Uploads folder (if exists)
    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Static caching
    location ~* \.(css|js|png|jpg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
